name: release

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    name: Linux packages
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libarchive-tools \
            libfuse2 \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            wget \
            zstd

      - name: Install app deps
        run: |
          npm ci
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Test
        run: |
          .venv/bin/python -m unittest discover -s tests
          npm run build
          cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build packages
        run: npm run tauri:build:linux

      - uses: actions/upload-artifact@v4
        with:
          name: gdictate-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/pacman/*.pkg.tar.zst
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  windows:
    name: Windows packages
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install app deps
        shell: pwsh
        run: |
          npm ci
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Test
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m unittest discover -s tests
          npm run build
          cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build packages
        env:
          GDICTATE_VENDOR_PY_DEPS: "1"
          GDICTATE_PYTHON: .\.venv\Scripts\python.exe
        run: npx tauri build --bundles nsis,msi

      - uses: actions/upload-artifact@v4
        with:
          name: gdictate-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-22.04
    needs:
      - linux
      - windows
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${files[@]}" --title "$TAG_NAME" --generate-notes
          fi
